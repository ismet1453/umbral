<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EgoShot — Character Select Frame Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020409;
      --cyan: #00f0ff;
      --red: #f87171;
      --violet: #c084fc;
    }
    body {
      font-family: "Rajdhani", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      margin: 0;
    }
    .font-display { font-family: "Cinzel", serif; }
    .char-frame-wrap {
      position: relative;
      width: min(100%, 1200px);
      aspect-ratio: 4 / 3;
      margin: 0 auto;
    }
    .char-frame-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 0;
    }
    .char-content {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      padding: 8% 5.5% 7% 5.5%;
      gap: 2%;
    }
    .panel-left { width: 24%; display: flex; flex-direction: column; }
    .panel-center { width: 44%; display: flex; align-items: center; justify-content: center; }
    .panel-right { width: 30%; display: flex; flex-direction: column; gap: 0.65rem; }

    .class-card {
      border: 1px solid rgba(248, 113, 113, 0.25);
      background: rgba(15, 23, 42, 0.45);
      padding: 0.55rem 0.65rem;
      margin-bottom: 0.45rem;
      cursor: pointer;
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    .class-card:hover { border-color: rgba(248, 113, 113, 0.55); }
    .class-card.active {
      border-color: rgba(248, 113, 113, 0.9);
      box-shadow: 0 0 16px rgba(248, 113, 113, 0.35);
    }
    .skill-slot {
      aspect-ratio: 1;
      border: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(2, 6, 23, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }
    .stat-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
    }
    .stat-bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #00f0ff, #38bdf8);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.45);
    }
    .lock-btn {
      margin-top: auto;
      padding: 0.65rem;
      border: 1px solid rgba(0, 240, 255, 0.55);
      background: rgba(0, 240, 255, 0.08);
      color: var(--cyan);
      font-family: "Cinzel", serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
    }
    .lock-btn:hover {
      background: rgba(0, 240, 255, 0.16);
      box-shadow: 0 0 28px rgba(0, 240, 255, 0.3);
    }
    .theme-switch {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 50;
      display: flex;
      gap: 0.5rem;
    }
    .theme-switch button {
      padding: 0.4rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .theme-switch button.active { border-color: #00f0ff; color: #00f0ff; }
  </style>
</head>
<body class="flex items-center justify-center p-4 md:p-8">
  <div class="theme-switch">
    <button type="button" id="btn-knight" class="active">Knight Frame</button>
    <button type="button" id="btn-monarch">Monarch Frame</button>
  </div>

  <div class="char-frame-wrap" id="frame-root">
    <!-- mix-blend-mode: screen — black becomes transparent, neon borders stay -->
    <img
      id="frame-img"
      src="./char-frame-knight.png"
      alt=""
      class="char-frame-img"
      aria-hidden="true"
    />

    <div class="char-content">
      <!-- LEFT ~25% -->
      <aside class="panel-left">
        <h2 class="font-display text-sm tracking-[0.28em] text-red-300 mb-3" style="text-shadow:0 0 12px rgba(248,113,113,0.5)">
          SELECT CLASS
        </h2>
        <button type="button" class="class-card active" data-class="assassin">
          <div class="text-red-200 font-semibold tracking-wider">ASSASSIN</div>
          <div class="text-[0.65rem] text-white/40">Shadow · Crit</div>
        </button>
        <button type="button" class="class-card" data-class="tank">
          <div class="text-red-200 font-semibold tracking-wider">TANK</div>
          <div class="text-[0.65rem] text-white/40">Infantry · DEF</div>
        </button>
        <button type="button" class="class-card" data-class="mage">
          <div class="text-red-200 font-semibold tracking-wider">MONARCH</div>
          <div class="text-[0.65rem] text-white/40">Jinwoo · DPS</div>
        </button>
      </aside>

      <!-- CENTER ~45% — keep empty for 3D render -->
      <main class="panel-center">
        <p class="font-mono text-cyan-400/50 text-xs tracking-widest text-center">
          [ 3D CHARACTER RENDER ]
        </p>
      </main>

      <!-- RIGHT ~30% -->
      <aside class="panel-right">
        <!-- Image has 2×4 slots, not 3×3 — grid matches artwork -->
        <div class="grid grid-cols-4 grid-rows-2 gap-1.5 flex-shrink-0" style="max-height:38%">
          <div class="skill-slot">⚔</div>
          <div class="skill-slot">☠</div>
          <div class="skill-slot">👑</div>
          <div class="skill-slot"></div>
          <div class="skill-slot"></div>
          <div class="skill-slot"></div>
          <div class="skill-slot"></div>
          <div class="skill-slot"></div>
        </div>

        <div class="flex-1 flex flex-col justify-center gap-2 text-xs text-white/70 mt-2">
          <div>
            <div class="flex justify-between mb-0.5"><span>HP</span><span>840</span></div>
            <div class="stat-bar"><span style="width:84%"></span></div>
          </div>
          <div>
            <div class="flex justify-between mb-0.5"><span>ATK</span><span>120</span></div>
            <div class="stat-bar"><span style="width:60%"></span></div>
          </div>
          <div>
            <div class="flex justify-between mb-0.5"><span>DEF</span><span>95</span></div>
            <div class="stat-bar"><span style="width:48%"></span></div>
          </div>
        </div>

        <button type="button" class="lock-btn">LOCK IN SELECTION</button>
      </aside>
    </div>
  </div>

  <script>
    const img = document.getElementById("frame-img");
    document.getElementById("btn-knight").onclick = () => {
      img.src = "./char-frame-knight.png";
      document.getElementById("btn-knight").classList.add("active");
      document.getElementById("btn-monarch").classList.remove("active");
    };
    document.getElementById("btn-monarch").onclick = () => {
      img.src = "./char-frame-monarch.png";
      document.getElementById("btn-monarch").classList.add("active");
      document.getElementById("btn-knight").classList.remove("active");
    };
    document.querySelectorAll(".class-card").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".class-card").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
  </script>
</body>
</html>
